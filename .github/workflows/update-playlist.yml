name: Update Music Playlist

on:
  push:
    branches:
      - main
    paths:
      - 'assets/audio/*.mp3'
  workflow_dispatch:

concurrency:
  group: update-playlist
  cancel-in-progress: true

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Generate playlist.json from mp3 files
        run: python3 scripts/generate-playlist.py

      - name: Commit and push playlist.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/audio/playlist.json

          if git diff --staged --quiet; then
            echo "playlist.json is already up to date."
            exit 0
          fi

          git commit -m "chore: auto-update playlist from audio files"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"