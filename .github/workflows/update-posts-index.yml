name: Update Posts Index

on:
  push:
    branches:
      - main
    paths:
      - 'posts/*.html'
  workflow_dispatch:

concurrency:
  group: update-posts-index
  cancel-in-progress: true

jobs:
  update-posts-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Generate index.json from html files
        run: python3 scripts/generate-posts-index.py

      - name: Commit and push index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/index.json

          if git diff --staged --quiet; then
            echo "index.json is already up to date."
            exit 0
          fi

          git commit -m "chore: auto-update posts index from html files"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"